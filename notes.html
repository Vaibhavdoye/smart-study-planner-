<!-- NOTES SECTION -->

<section class="notes">

    <h2>Write Your Notes 📝</h2>

    <textarea

    id="notesInput"

    placeholder="Write Notes Here">

    </textarea>

    <br>

    <button onclick="saveNotes()">
        Save Notes
    </button>

</section>

<!-- SAVED MESSAGE -->

<h3 id="savedMessage">

</h3>

<!-- JAVASCRIPT -->

<script>

/* SAVE NOTES */

function saveNotes(){

    let notes =

    document.getElementById(
    "notesInput"
    ).value;

    localStorage.setItem(
        "notes",
        notes
    );

    document.getElementById(
    "savedMessage"
    ).innerHTML =

    "Notes Saved Successfully ✅";
}

/* SHOW NOTES */

window.onload = function(){

    document.getElementById(
    "notesInput"
    ).value =

    localStorage.getItem(
    "notes"
    );
}

</script>
